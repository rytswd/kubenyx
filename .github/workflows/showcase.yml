# Showcase: every kubenyx scenario, on demand.
#
# workflow_dispatch fans out one job per check leg — the full matrix
# (single-node through 3-server quorum, failover, hitless scale-out,
# snapshot mint/restore, and the stock-Kubernetes version legs) — plus
# an imperative job that drives a live cluster the way any automation
# would: boot, kubectl, attached snapshot, pristine-cluster cycling.
#
# The leg list is evaluated from the flake at run time, so new checks
# show up here with zero workflow edits. Pick one scenario via the
# input, or run everything with "all".
name: Showcase

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'A checks leg (e.g. single-node, failover, single-node-k8s-1_34), "imperative", "cached-resume", or "all"'
        type: string
        default: all

permissions:
  contents: read

jobs:
  resolve:
    name: resolve scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      legs: ${{ steps.pick.outputs.legs }}
      imperative: ${{ steps.pick.outputs.imperative }}
      cached-resume: ${{ steps.pick.outputs.cached-resume }}
    env:
      WANT: ${{ inputs.scenario }}
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
      - id: pick
        run: |
          ALL=$(nix eval --json .#checks.x86_64-linux --apply builtins.attrNames)
          # snapshot-mint/-restore pin the Skylake-Server-v4 CPU template
          # (see tests/snapshot-mint.nix) — hosted runners are a CPU
          # lottery (AMD, feature-masked Intel), so they only run when
          # asked for by name.
          METAL_ONLY='["snapshot-mint","snapshot-restore"]'
          case "$WANT" in
            all)
              LEGS=$(echo "$ALL" | jq -c --argjson m "$METAL_ONLY" 'map(select(. as $l | $m | index($l) | not))')
              echo "excluded (pinned-CPU, run by name on metal-class hosts): $METAL_ONLY"
              IMP=true; CRES=true ;;
            imperative)    LEGS='[]';   IMP=true;  CRES=false ;;
            cached-resume) LEGS='[]';   IMP=false; CRES=true ;;
            *)
              # Whitelist against the evaluated attr names — an unknown
              # scenario fails here, not 27 jobs deep.
              LEGS=$(echo "$ALL" | jq -c --arg w "$WANT" 'map(select(. == $w))')
              IMP=false; CRES=false
              if [ "$LEGS" = '[]' ]; then
                echo "unknown scenario '$WANT' — available: $ALL, imperative, cached-resume" >&2
                exit 1
              fi ;;
          esac
          echo "legs=$LEGS" >> "$GITHUB_OUTPUT"
          echo "imperative=$IMP" >> "$GITHUB_OUTPUT"
          echo "cached-resume=$CRES" >> "$GITHUB_OUTPUT"
          echo "running: $LEGS (imperative: $IMP, cached-resume: $CRES)"

  scenario:
    name: checks.${{ matrix.leg }}
    needs: resolve
    if: needs.resolve.outputs.legs != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        leg: ${{ fromJSON(needs.resolve.outputs.legs) }}
    steps:
      - uses: actions/checkout@v6
      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia@v2
      # Multi-VM legs overcommit the 16 GB runner (multi-server is
      # 4 nodes x 4 GB); guests touch pages lazily, swap absorbs the rest.
      - name: Add swap on the scratch disk
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - name: Run check
        run: nix build -L .#checks.x86_64-linux.${{ matrix.leg }}

  imperative:
    name: imperative — boot, kubectl, snapshot cycle
    needs: resolve
    if: needs.resolve.outputs.imperative == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia@v2
      - name: Host tap
        run: |
          sudo ip tuntap add kubenyx-tap0 mode tap user "$(id -un)"
          sudo ip addr add 10.100.0.1/24 dev kubenyx-tap0
          sudo ip link set kubenyx-tap0 up
      - name: Boot, drive with kubectl, snapshot, cycle
        run: |
          set -euxo pipefail
          command -v kubectl
          # Build the guest closure in the foreground so any build error
          # is visible here, not buried in console.log.
          nix build --no-link .#microvm-firecracker
          # 1. Cold boot a real cluster and talk to it like any client.
          nix run .#cp1 > console.log 2>&1 &
          CP1=$!
          ok=""
          for _ in $(seq 120); do
            if curl -sf --connect-timeout 1 --max-time 2 10.100.0.2:10124 -o kubeconfig; then
              ok=1; break
            fi
            sleep 1
          done
          test -n "$ok"
          kubectl --kubeconfig kubeconfig get nodes
          kubectl --kubeconfig kubeconfig get pods -A
          # 2. Attached snapshot: pause, cut, resume — the cluster keeps
          #    serving afterwards.
          nix run .#kubenyx -- snap take --sock kubenyx.sock --out snap
          kubectl --kubeconfig kubeconfig get nodes
          # 3. Recreate pristine clusters from the snapshot, N rounds.
          kill "$CP1" 2>/dev/null || true
          pkill -f firecracker || true
          sleep 2
          nix run .#kubenyx -- snap cycle --snapshot snap -n 3
      - name: Console log
        if: always()
        run: tail -200 console.log || true

  cached-resume:
    name: cached-resume — respawn from the Actions-cache snapshot
    needs: resolve
    if: needs.resolve.outputs.cached-resume == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia@v2
      - name: Host tap
        run: |
          sudo ip tuntap add kubenyx-tap0 mode tap user "$(id -un)"
          sudo ip addr add 10.100.0.1/24 dev kubenyx-tap0
          sudo ip link set kubenyx-tap0 up
      # Restore by key prefix: whatever snapshot-mint.yml last saved for
      # ANY CPU class. The snapshot identity gate arbitrates below — a
      # wrong-CPU or wrong-closure hit is refused and we cold-boot.
      - uses: actions/cache/restore@v4
        with:
          path: /tmp/w/snap.tzst
          key: kubenyx-snap-cp1- # never exact-matches; prefix does the work
          restore-keys: kubenyx-snap-cp1-
      - name: Respawn (snapshot if compatible, else cold boot)
        run: |
          set -euo pipefail
          mkdir -p /tmp/w && cd /tmp/w
          # The snapshot's memory maps the guest store image from
          # /nix/store — materialize the closure first (a hestia cache
          # pull, seconds). If the closure drifted since the mint, the
          # identity gate refuses the resume and we cold-boot instead.
          nix build --no-link "$GITHUB_WORKSPACE#microvm-firecracker"
          T0=$(date +%s%3N)
          if [ -f snap.tzst ] && tar --zstd -xf snap.tzst \
             && nix run "$GITHUB_WORKSPACE#kubenyx" -- snap resume --snapshot snap; then
            PATH_TAKEN="snapshot resume"
          else
            echo "no compatible cached snapshot — cold booting"
            nix run "$GITHUB_WORKSPACE#cp1" > console.log 2>&1 &
            PATH_TAKEN="cold boot (fallback)"
          fi
          ok=""
          for _ in $(seq 120); do
            if curl -sf --connect-timeout 1 --max-time 2 10.100.0.2:10124 -o kubeconfig; then
              ok=1; break
            fi
            sleep 1
          done
          test -n "$ok"
          T1=$(date +%s%3N)
          kubectl --kubeconfig kubeconfig get nodes
          echo "SHOWCASE cluster served via: $PATH_TAKEN in $((T1 - T0)) ms"
      - name: Console log on failure
        if: failure()
        run: tail -100 /tmp/w/console.log || true
